  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Load Umami analytics only when the endpoint was injected at build time
      (function() {
        var ep = "%VITE_ANALYTICS_ENDPOINT%";
        var id = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (ep && !ep.includes("VITE_ANALYTICS") && id && !id.includes("VITE_ANALYTICS")) {
          var s = document.createElement("script");
          s.defer = true;
          s.src = ep + "/umami";
          s.setAttribute("data-website-id", id);
          document.head.appendChild(s);
        }
      })();
    </script>
    <script>
      // Detect stale Vite asset loads after redeployment and auto-reload once.
      // Covers: <script> load errors (DOM events) AND dynamic import() failures (promise rejections).
      (function() {
        var KEY = "__asset_reload";
        function doReload() {
          if (!sessionStorage.getItem(KEY)) {
            sessionStorage.setItem(KEY, "1");
            window.location.reload();
          }
        }
        window.addEventListener("error", function(e) {
          var t = e.target;
          if (t && (t.tagName === "SCRIPT" || t.tagName === "LINK") && (t.src || t.href || "").includes("/assets/")) {
            doReload();
          }
        }, true);
        window.addEventListener("unhandledrejection", function(e) {
          var msg = e.reason && (e.reason.message || String(e.reason));
          if (msg && (/Failed to fetch dynamically imported module/i.test(msg) || /Loading (CSS )?chunk .* failed/i.test(msg))) {
            doReload();
          }
        });
        window.addEventListener("load", function() { sessionStorage.removeItem(KEY); });
      })();
    </script>
  </body>
